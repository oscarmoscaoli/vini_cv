    <script>
        const pageData = {
            pt: { title: "Portfólio Completo", vertical: "Conteúdo Vertical (Reels / Shorts)", seeMore: "Veja Mais no Behance", back: "← Voltar para Início" },
            en: { title: "Full Portfolio", vertical: "Vertical Content (Reels / Shorts)", seeMore: "See More on Behance", back: "← Back to Home" }
        };
        let lang = 'pt';
        function translatePage() {
            const t = pageData[lang];
            if(document.getElementById('page-portfolio-title')) document.getElementById('page-portfolio-title').textContent = t.title;
            if(document.getElementById('title-vertical')) document.getElementById('title-vertical').textContent = t.vertical;
            if(document.getElementById('btn-see-more')) document.getElementById('btn-see-more').textContent = t.seeMore;
            if(document.getElementById('back-home')) document.getElementById('back-home').textContent = t.back;
        }
        document.getElementById('lang-toggle').addEventListener('click', () => {
            lang = lang === 'pt' ? 'en' : 'pt';
            document.getElementById('lang-toggle').textContent = lang === 'pt' ? 'EN' : 'PT';
            translatePage();
        });
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            document.getElementById('theme-toggle').textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
        });
